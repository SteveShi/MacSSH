name: Auto Bump Dependencies and Release App

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Check Dependencies Versions
        id: check-deps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Get latest remote versions
          LATEST_LIBSSH2=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/SteveShi/libssh2-swift/releases/latest | jq -r .tag_name)
          LATEST_LIBSSH2_VER=${LATEST_LIBSSH2#v}

          LATEST_GHOSTTY=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/SteveShi/libghostty-swift/releases/latest | jq -r .tag_name)
          LATEST_GHOSTTY_VER=${LATEST_GHOSTTY#v}

          echo "Latest remote libssh2-swift: $LATEST_LIBSSH2_VER"
          echo "Latest remote libghostty-swift: $LATEST_GHOSTTY_VER"

          # Parse current local versions from project.yml
          CURRENT_LIBSSH2_VER=$(grep -A 2 "libssh2-swift:" project.yml | grep "from:" | sed 's/.*from: //')
          CURRENT_GHOSTTY_VER=$(grep -A 2 "libghostty-swift:" project.yml | grep "from:" | sed 's/.*from: //')

          echo "Current local libssh2-swift: $CURRENT_LIBSSH2_VER"
          echo "Current local libghostty-swift: $CURRENT_GHOSTTY_VER"

          UPDATED=false
          if [[ "$LATEST_LIBSSH2_VER" != "$CURRENT_LIBSSH2_VER" ]]; then
            echo "libssh2-swift needs update: $CURRENT_LIBSSH2_VER -> $LATEST_LIBSSH2_VER"
            sed -i '' "/libssh2-swift:/,/from:/s/from: $CURRENT_LIBSSH2_VER/from: $LATEST_LIBSSH2_VER/" project.yml
            UPDATED=true
          fi

          if [[ "$LATEST_GHOSTTY_VER" != "$CURRENT_GHOSTTY_VER" ]]; then
            echo "libghostty-swift needs update: $CURRENT_GHOSTTY_VER -> $LATEST_GHOSTTY_VER"
            sed -i '' "/libghostty-swift:/,/from:/s/from: $CURRENT_GHOSTTY_VER/from: $LATEST_GHOSTTY_VER/" project.yml
            UPDATED=true
          fi

          if [[ "$UPDATED" == "true" ]]; then
            echo "updates_available=true" >> "$GITHUB_OUTPUT"
            echo "latest_libssh2=$LATEST_LIBSSH2_VER" >> "$GITHUB_OUTPUT"
            echo "latest_ghostty=$LATEST_GHOSTTY_VER" >> "$GITHUB_OUTPUT"
          else
            echo "updates_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Xcode
        if: steps.check-deps.outputs.updates_available == 'true'
        uses: SteveShi/setup-xcode@v2
        with:
          xcode-version: 'latest-stable'

      - name: Build and Release App
        if: steps.check-deps.outputs.updates_available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_LIBSSH2_VER: ${{ steps.check-deps.outputs.latest_libssh2 }}
          LATEST_GHOSTTY_VER: ${{ steps.check-deps.outputs.latest_ghostty }}
          SPARKLE_SECRET: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          # Get current versions
          CURRENT_APP_VER=$(grep "MARKETING_VERSION:" project.yml | head -n 1 | sed 's/.*MARKETING_VERSION: "\(.*\)"/\1/')
          CURRENT_BUILD_VER=$(grep "CURRENT_PROJECT_VERSION:" project.yml | head -n 1 | sed 's/.*CURRENT_PROJECT_VERSION: "\(.*\)"/\1/')

          IFS='.' read -r -a APP_PARTS <<< "$CURRENT_APP_VER"
          NEXT_APP_PATCH=$((APP_PARTS[2] + 1))
          NEXT_APP_VER="${APP_PARTS[0]}.${APP_PARTS[1]}.${NEXT_APP_PATCH}"
          NEXT_BUILD_VER=$((CURRENT_BUILD_VER + 1))

          echo "Bumping app version: $CURRENT_APP_VER -> $NEXT_APP_VER"
          echo "Bumping build version: $CURRENT_BUILD_VER -> $NEXT_BUILD_VER"

          # Apply version updates
          sed -i '' "s/MARKETING_VERSION: \"$CURRENT_APP_VER\"/MARKETING_VERSION: \"$NEXT_APP_VER\"/g" project.yml
          sed -i '' "s/CURRENT_PROJECT_VERSION: \"$CURRENT_BUILD_VER\"/CURRENT_PROJECT_VERSION: \"$NEXT_BUILD_VER\"/g" project.yml

          # Prepend CHANGELOG.md
          cat <<EOF | sed 's/^          //' > changelog_temp.md
          ## [${NEXT_APP_VER}] - $(date +%Y-%m-%d)

          ### Changed
          - Automatically bumped dependencies to libssh2-swift version ${LATEST_LIBSSH2_VER} and libghostty-swift version ${LATEST_GHOSTTY_VER}.

          ---

          ### Chinese
          ### 变更
          - 自动更新依赖项 libssh2-swift 至版本 ${LATEST_LIBSSH2_VER}，libghostty-swift 至版本 ${LATEST_GHOSTTY_VER}。

          ---
          EOF

          # Extract English and Chinese Release Notes
          sed -n '1,/### Chinese/p' changelog_temp.md | grep -v "### Chinese" > release_notes_en.md
          sed -n '/### Chinese/,$p' changelog_temp.md | sed '1d' > release_notes_zh.md

          if [ ! -s release_notes_zh.md ]; then cp release_notes_en.md release_notes_zh.md; fi
          if [ ! -s release_notes_en.md ]; then cp changelog_temp.md release_notes_en.md; fi

          # Generate release_notes.md for Release notes-file body
          cat release_notes_en.md > release_notes.md
          echo -e "\n---\n" >> release_notes.md
          cat release_notes_zh.md >> release_notes.md

          cat changelog_temp.md CHANGELOG.md > changelog_merged.md
          mv changelog_merged.md CHANGELOG.md
          rm changelog_temp.md

          # Regenerate Xcode Project and resolve packages
          xcodegen
          xcodebuild -resolvePackageDependencies -project MacSSH.xcodeproj

          # Build release bundle
          xcodebuild -scheme MacSSH -configuration Release -derivedDataPath BuildData build

          # Locate compiled App and sign it
          APP_PATH=$(find BuildData/Build/Products/Release -name "MacSSH.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL ERROR: MacSSH.app not found!"
            exit 1
          fi

          echo "Applying deep ad-hoc signature..."
          codesign --force --deep -s - "$APP_PATH"

          # Zip executable app bundle
          APP_DIR=$(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")
          cd "$APP_DIR"
          zip -qy -r "$GITHUB_WORKSPACE/MacSSH.zip" "$APP_NAME"
          cd -

          # Create DMG
          rm -rf dmg_root
          mkdir -p dmg_root
          cp -R "$APP_PATH" dmg_root/
          hdiutil create -volname "MacSSH" -srcfolder dmg_root -ov -format UDZO "MacSSH.dmg"
          rm -rf dmg_root

          # Generate Sparkle Appcast
          SPARKLE_VERSION=$(gh api repos/sparkle-project/Sparkle/releases/latest --jq '.tag_name' | sed 's/^v//')
          curl -fL -H "User-Agent: curl" -o Sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          tar -xf Sparkle.tar.xz

          CLEAN_KEY=$(echo "$SPARKLE_SECRET" | sed 's/EdDSAPrivateKey://' | tr -dc 'A-Za-z0-9+/=')
          
          if [ -z "$CLEAN_KEY" ]; then
            echo "ERROR: SPARKLE_PRIVATE_KEY secret is missing!"
            exit 1
          fi

          mkdir -p deploy
          cp MacSSH.zip deploy/
          cp release_notes_en.md "deploy/release_notes_en.md"
          cp release_notes_zh.md "deploy/release_notes_zh.md"
          cp release_notes_en.md "deploy/release_notes.md"
          
          export DYLD_FRAMEWORK_PATH="$PWD"
          
          echo "$CLEAN_KEY" | ./bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/SteveShi/MacSSH/releases/download/v${NEXT_APP_VER}/" \
            deploy/
          
          if [ -f "deploy/appcast.xml" ]; then
            mv deploy/appcast.xml .
            sed -i.bak '/<description>/d' appcast.xml
            sed -i.bak '/<sparkle:releaseNotesLink>/d' appcast.xml
            
            EN_LINK="https://github.com/SteveShi/MacSSH/releases/download/v${NEXT_APP_VER}/release_notes_en.md"
            ZH_LINK="https://github.com/SteveShi/MacSSH/releases/download/v${NEXT_APP_VER}/release_notes_zh.md"
            
            sed -i.bak "/<enclosure/i\\
            <sparkle:releaseNotesLink xml:lang=\"en\">$EN_LINK</sparkle:releaseNotesLink>" appcast.xml
            sed -i.bak "/<enclosure/i\\
            <sparkle:releaseNotesLink xml:lang=\"zh-Hans\">$ZH_LINK</sparkle:releaseNotesLink>" appcast.xml
            
            rm appcast.xml.bak
          else
            echo "ERROR: generate_appcast failed to produce appcast.xml."
            exit 1
          fi

          # Configure Git and push (Do this BEFORE creating release)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add project.yml CHANGELOG.md
          git commit -m "Auto bump dependencies and version to ${NEXT_APP_VER} [skip ci]"
          git push origin main

          # Create Release and upload assets
          gh release create "v${NEXT_APP_VER}" \
            MacSSH.zip \
            MacSSH.dmg \
            appcast.xml \
            release_notes_en.md \
            release_notes_zh.md \
            --title "v${NEXT_APP_VER}" \
            --notes-file release_notes.md

          # Update Homebrew tap Cask
          SHA256=$(shasum -a 256 "MacSSH.dmg" | awk '{print $1}')
          
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/SteveShi/homebrew-tap.git tap-repo
          cd tap-repo
          
          sed -i '' "s/version \".*\"/version \"${NEXT_APP_VER}\"/" Casks/macssh.rb
          sed -i '' -E "s/sha256 (\"[a-f0-9]+\"|:no_check)/sha256 \"$SHA256\"/" Casks/macssh.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/macssh.rb
          git commit -m "Update macssh to ${NEXT_APP_VER}"
          git push
          cd -
