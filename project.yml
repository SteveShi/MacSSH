name: MacSSH

options:
  minimumXcodeGenVersion: 2.38.0
  developmentLanguage: en
  localizations:
    - zh-Hans
    - en

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_VERSION: "6.0"
    PRODUCT_NAME: "MacSSH"
    MARKETING_VERSION: "1.8.10"
    CURRENT_PROJECT_VERSION: "190"
    ARCHS: "arm64"
    ONLY_ACTIVE_ARCH: "NO"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0
  libghostty-swift:
    url: https://github.com/SteveShi/libghostty-swift.git
    from: 1.0.12
  libssh2-swift:
    url: https://github.com/SteveShi/libssh2-swift.git
    from: 1.3.4


schemes:
  MacSSH:
    build:
      targets:
        MacSSH: all
    run:
      config: Debug

targets:
  MacSSH:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - Sources
    settings:
      base:
        INFOPLIST_FILE: Sources/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.steveshi.macssh
        CURRENT_PROJECT_VERSION: $(CURRENT_PROJECT_VERSION)
        MARKETING_VERSION: $(MARKETING_VERSION)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        HEADER_SEARCH_PATHS: "$(SRCROOT)/ThirdParty/include"
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/ThirdParty/lib"
        FRAMEWORK_SEARCH_PATHS: "$(SRCROOT)/ThirdParty/lib"
        OTHER_CFLAGS: "-I$(SRCROOT)/ThirdParty/include"
        OTHER_LDFLAGS: "-lghostty-vt -lc++ -framework Carbon"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - package: Sparkle
        product: Sparkle
      - package: libghostty-swift
        product: libghostty-swift
      - package: libssh2-swift
        product: libssh2-swift
    postBuildScripts:
      - name: Embed libghostty-vt
        runOnlyForDeploymentPostprocessing: false
        basedOnDependencyAnalysis: true
        inputFiles:
          - $(SRCROOT)/ThirdParty/lib/libghostty-vt.dylib
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(FRAMEWORKS_FOLDER_PATH)/libghostty-vt.dylib
        script: |
          set -euo pipefail
          SRC="${SRCROOT}/ThirdParty/lib/libghostty-vt.dylib"
          DST="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          mkdir -p "$DST"
          cp -f "$SRC" "$DST/"
          codesign --force --sign - "$DST/libghostty-vt.dylib"
